<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - DOM Manipulation & Event Handling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <div class="header-content">
            <h1>📋 Task Manager</h1>
            <div class="header-controls">
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                    🌙 Dark Mode
                </button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="container">
        
        <!-- Left Section: Task Creation & Management -->
        <div class="left-section">
            
            <!-- Task Creation Form -->
            <section class="form-section">
                <h2>Add New Task</h2>
                <form id="taskForm" class="task-form">
                    <div class="form-group">
                        <label for="taskTitle">Task Title</label>
                        <input 
                            type="text" 
                            id="taskTitle" 
                            placeholder="Enter task title"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="taskCategory">Category</label>
                        <select id="taskCategory">
                            <option value="work">Work</option>
                            <option value="personal">Personal</option>
                            <option value="shopping">Shopping</option>
                            <option value="health">Health</option>
                            <option value="learning">Learning</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        ➕ Add Task
                    </button>
                </form>
            </section>

            <!-- Task Statistics -->
            <section class="stats-section">
                <div class="stat-card">
                    <h3>Total Tasks</h3>
                    <p id="totalTasks" class="stat-number">0</p>
                </div>
                <div class="stat-card">
                    <h3>Completed</h3>
                    <p id="completedTasks" class="stat-number">0</p>
                </div>
                <div class="stat-card">
                    <h3>Pending</h3>
                    <p id="pendingTasks" class="stat-number">0</p>
                </div>
            </section>

            <!-- Task Filter -->
            <section class="filter-section">
                <h3>Filter by Category</h3>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="work">Work</button>
                    <button class="filter-btn" data-filter="personal">Personal</button>
                    <button class="filter-btn" data-filter="shopping">Shopping</button>
                    <button class="filter-btn" data-filter="health">Health</button>
                    <button class="filter-btn" data-filter="learning">Learning</button>
                </div>
            </section>

            <!-- Clear All Button -->
            <section class="action-section">
                <button id="clearAllBtn" class="btn btn-danger">🗑️ Clear All Tasks</button>
                <button id="searchBtn" class="btn btn-secondary">🔍 Search Tasks</button>
            </section>
        </div>

        <!-- Right Section: Tasks Display -->
        <div class="right-section">
            
            <!-- Task Search Box -->
            <div id="searchBox" class="search-box hidden">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search tasks by title..."
                    class="search-input"
                >
                <button id="closeSearch" class="btn btn-small">✕</button>
            </div>

            <!-- Tasks Container (Event Delegation attached here) -->
            <section id="tasksContainer" class="tasks-container">
                <div class="empty-state">
                    <p>📝 No tasks yet. Create one to get started!</p>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 Task Manager - Built with Vanilla JavaScript | DOM APIs & Event Handling Demonstration</p>
    </footer>

    <!-- Load JavaScript -->
    <script src="script.js"></script>
</body>
</html>
